services:
  - type: web
    name: heic2jpg-backend
    runtime: node
    rootDir: backend
    buildCommand: corepack enable && pnpm install --frozen-lockfile
    startCommand: corepack enable && pnpm start
    healthCheckPath: /api/health/ready
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: CORS_CREDENTIALS
        value: "true"
      - key: SESSION_MAX_AGE_DAYS
        value: "7"
      - key: CLEANUP_OLD_FILES
        value: "true"
      - key: FILE_RETENTION_HOURS
        value: "24"
      - key: CLEANUP_INTERVAL_HOURS
        value: "1"
      - key: BACKEND_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
